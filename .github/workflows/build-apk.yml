name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        default: 'WebToApp'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a release if we want to

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply App Configuration
        run: node WebToApp/apply_config.js

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./WebToApp/gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./WebToApp

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_id }}
          path: WebToApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
