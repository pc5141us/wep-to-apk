<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة التطبيق | Web-App Preview</title>
    <!-- Fonts Cairo & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2196f3;
            --primary-color-rgb: 33, 150, 243;
            --bg-dark: #121212;
            --bg-light: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Responsive Preview Container */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Desktop Wrapper Frame */
        .device-wrapper {
            width: 360px;
            height: 740px;
            background-color: #1e1e1e;
            border: 12px solid #000;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .device-speaker {
            width: 60px;
            height: 5px;
            background-color: #333;
            border-radius: 10px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .device-home-bar {
            width: 100px;
            height: 4px;
            background-color: #666;
            border-radius: 10px;
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* Interactive Phone Screen */
        .phone-screen {
            flex: 1;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .phone-screen.dark-theme {
            background-color: var(--bg-dark);
            color: #e0e0e0;
        }

        /* Topbar Header */
        .app-topbar {
            background-color: var(--primary-color);
            color: white;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 4;
        }

        .drawer-trigger, .topbar-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .drawer-trigger:hover, .topbar-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .app-title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
            text-align: right;
            margin-right: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Address bar for Web URLs */
        .address-bar {
            background-color: #e5e7eb;
            color: #4b5563;
            padding: 6px 12px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #d1d5db;
            direction: ltr;
        }

        .dark-theme .address-bar {
            background-color: #242526;
            color: #a0aec0;
            border-bottom-color: #2d3748;
        }

        .address-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* Main Content Viewports */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #fff;
        }

        .dark-theme .content-area {
            background: var(--bg-dark);
        }

        .iframe-view {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .dark-theme .iframe-view {
            background: var(--bg-dark);
        }

        .html-view {
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            background: #ffffff;
            color: #333333;
            line-height: 1.6;
        }

        .dark-theme .html-view {
            background: #181818;
            color: #e2e8f0;
        }

        /* Sidebar Navigation Drawer */
        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .app-drawer {
            position: absolute;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100%;
            background-color: #ffffff;
            color: #1a202c;
            z-index: 9;
            display: flex;
            flex-direction: column;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -4px 0 12px rgba(0,0,0,0.15);
        }

        .dark-theme .app-drawer {
            background-color: #1f2937;
            color: #f3f4f6;
        }

        .app-drawer.active {
            right: 0;
        }

        .drawer-header {
            padding: 24px 16px;
            background-color: #ebf8ff;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .dark-theme .drawer-header {
            background-color: rgba(var(--primary-color-rgb), 0.12);
            border-bottom-color: #374151;
        }

        .drawer-logo {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 8px;
            background: #ffffff;
            padding: 3px;
            border: 1px solid #e2e8f0;
        }

        .drawer-header-text h5 {
            font-size: 14px;
            font-weight: 700;
            color: #2b6cb0;
        }

        .dark-theme .drawer-header-text h5 {
            color: var(--primary-color);
        }

        .drawer-header-text span {
            font-size: 10px;
            color: #718096;
        }

        .dark-theme .drawer-header-text span {
            color: #a0aec0;
        }

        .drawer-menu-title {
            font-size: 11px;
            font-weight: 700;
            color: #a0aec0;
            padding: 16px 16px 8px 16px;
            text-transform: uppercase;
        }

        .drawer-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 8px;
            overflow-y: auto;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-theme .menu-item {
            color: #cbd5e0;
        }

        .menu-item:hover {
            background-color: #f7fafc;
        }

        .dark-theme .menu-item:hover {
            background-color: #2d3748;
        }

        .menu-item.active {
            background-color: #ebf8ff;
            color: var(--primary-color);
        }

        .dark-theme .menu-item.active {
            background-color: rgba(var(--primary-color-rgb), 0.15);
            color: var(--primary-color);
        }

        .menu-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .drawer-footer {
            padding: 16px;
            font-size: 12px;
            color: #a0aec0;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dark-theme .drawer-footer {
            border-top-color: #374151;
        }

        /* Disclaimer bar */
        .disclaimer-banner {
            position: absolute;
            bottom: 12px;
            background: rgba(0, 0, 0, 0.85);
            color: #f59e0b;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.4;
            max-width: 320px;
            text-align: center;
            border: 1px dashed #f59e0b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .disclaimer-banner i {
            font-size: 14px;
            margin-bottom: 4px;
            display: block;
        }

        /* Loading indicator splash screen */
        .loading-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            color: #1e1e1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 16px;
            transition: opacity 0.5s ease;
        }

        .dark-theme .loading-screen {
            background: #121212;
            color: #ffffff;
        }

        .splash-logo {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            object-fit: contain;
            border: 3px solid var(--primary-color);
            background: #f9f9f9;
            padding: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .dark-theme .splash-logo {
            background: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .splash-logo-fallback {
            font-size: 56px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .splash-app-name {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0,0,0,0.05);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .dark-theme .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Mobile Layout (Fullscreen) */
        @media (max-width: 480px) {
            body {
                background-color: var(--bg-light);
            }
            .device-wrapper {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
            .device-speaker, .device-home-bar {
                display: none;
            }
            .disclaimer-banner {
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="preview-container">
        <!-- Phone Simulator Frame -->
        <div class="device-wrapper">
            <div class="device-speaker"></div>
            
            <div class="phone-screen" id="phone-screen">
                <!-- Splash Screen inside Phone -->
                <div class="loading-screen" id="loading-screen">
                    <div id="splash-logo-container"></div>
                    <div class="splash-app-name" id="splash-app-name">جاري التحميل...</div>
                    <div style="height: 12px;"></div>
                    <div class="spinner"></div>
                </div>

                <!-- App Header Topbar -->
                <header class="app-topbar">
                    <button class="drawer-trigger" id="drawer-toggle"><i class="fa-solid fa-bars"></i></button>
                    <h4 class="app-title" id="app-title">جاري التحميل...</h4>
                    <button class="topbar-btn" id="reload-btn" title="تحديث"><i class="fa-solid fa-rotate-right"></i></button>
                </header>

                <!-- Address Bar (shows for Web URL pages) -->
                <div class="address-bar" id="address-bar">
                    <i class="fa-solid fa-lock text-success" style="color: #10b981;"></i>
                    <span class="address-text" id="address-text">about:blank</span>
                </div>

                <!-- Main Viewport Area -->
                <div class="content-area" id="content-area">
                    <!-- HTML or IFrame gets dynamically loaded here -->
                </div>

                <!-- Navigation Drawer Menu -->
                <div class="drawer-overlay" id="drawer-overlay"></div>
                <aside class="app-drawer" id="app-drawer">
                    <div style="height: 16px;"></div>
                    <nav class="drawer-menu" id="drawer-menu-nav">
                        <!-- Dynamic items -->
                    </nav>
                </aside>
            </div>
            
            <div class="device-home-bar"></div>
        </div>

        <!-- IFrame/CSP Warnings disclaimer banner -->
        <div class="disclaimer-banner" id="disclaimer-banner">
            <i class="fa-solid fa-triangle-exclamation"></i>
            بسبب قيود حماية المتصفحات (X-Frame-Options)، قد تظهر بعض المواقع كصفحة فارغة في المتصفح. ولكنها <strong>ستعمل بنسبة 100% وبدون مشاكل</strong> داخل التطبيق الفعلي (APK) بعد التثبيت.
        </div>
    </div>

    <script>
        let config = null;
        let activePageId = null;

        // Elements
        const dom = {
            loadingScreen: document.getElementById('loading-screen'),
            phoneScreen: document.getElementById('phone-screen'),
            appTitle: document.getElementById('app-title'),
            reloadBtn: document.getElementById('reload-btn'),
            addressBar: document.getElementById('address-bar'),
            addressText: document.getElementById('address-text'),
            contentArea: document.getElementById('content-area'),
            drawerToggle: document.getElementById('drawer-toggle'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            appDrawer: document.getElementById('app-drawer'),
            drawerTitle: document.getElementById('drawer-title'),
            drawerMenuNav: document.getElementById('drawer-menu-nav'),
            disclaimerBanner: document.getElementById('disclaimer-banner')
        };

        // Load config from server
        async function fetchConfig() {
            try {
                const sessionId = localStorage.getItem('session_id') || 'default';
                const res = await fetch(`/api/config?sessionId=${sessionId}`);
                if (res.ok) {
                    config = await res.json();
                    initializePreview();
                } else {
                    document.body.innerHTML = "<h2 style='text-align:center; padding:50px;'>فشل تحميل الإعدادات. يرجى التأكد من تشغيل السيرفر.</h2>";
                }
            } catch (e) {
                console.error(e);
                document.body.innerHTML = "<h2 style='text-align:center; padding:50px;'>حدث خطأ أثناء تحميل معاينة التطبيق.</h2>";
            }
        }

        function initializePreview() {
            // Apply theme configuration
            document.title = config.appName + " | معاينة تفاعلية";
            dom.appTitle.textContent = config.appName;
            if (dom.drawerTitle) {
                dom.drawerTitle.textContent = config.appName;
            }
            
            // Set colors
            document.documentElement.style.setProperty('--primary-color', config.themeColorHex);
            const rgb = hexToRgb(config.themeColorHex);
            if (rgb) {
                document.documentElement.style.setProperty('--primary-color-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
            }

            // Dark/Light Theme class
            if (config.isDarkTheme) {
                dom.phoneScreen.classList.add('dark-theme');
            }

            // Drawer interactions
            dom.drawerToggle.addEventListener('click', openDrawer);
            dom.drawerOverlay.addEventListener('click', closeDrawer);
            
            // Reload action
            dom.reloadBtn.addEventListener('click', () => {
                const iframe = dom.contentArea.querySelector('iframe');
                if (iframe) {
                    iframe.src = iframe.src;
                }
            });

            // Populate splash screen name and logo
            document.getElementById('splash-app-name').textContent = config.appName;
            const logoContainer = document.getElementById('splash-logo-container');
            if (config.logoUrl && config.logoUrl.startsWith('http')) {
                logoContainer.innerHTML = `<img src="${config.logoUrl}" class="splash-logo" alt="Logo">`;
            } else {
                logoContainer.innerHTML = `<i class="fa-solid fa-globe splash-logo-fallback"></i>`;
            }

            // Render menus and default content
            renderMenu();
            loadPage(null); // Load home page initially

            // Remove loading splash screen after 3 seconds (3000ms) with fade-out
            setTimeout(() => {
                dom.loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    dom.loadingScreen.style.display = 'none';
                }, 500);
            }, 3000);
        }

        // Render drawer menu list
        function renderMenu() {
            dom.drawerMenuNav.innerHTML = '';
            
            // Add Home / الرئيسية item
            const homeItem = document.createElement('div');
            homeItem.className = `menu-item ${activePageId === null ? 'active' : ''}`;
            homeItem.innerHTML = `<i class="fa-solid fa-house"></i> <span>الرئيسية</span>`;
            homeItem.addEventListener('click', () => {
                loadPage(null);
                closeDrawer();
            });
            dom.drawerMenuNav.appendChild(homeItem);
            
            if (config.sidebarItems && config.sidebarItems.length > 0) {
                config.sidebarItems.forEach(item => {
                    const menuItem = document.createElement('div');
                    menuItem.className = `menu-item ${activePageId === item.id ? 'active' : ''}`;
                    menuItem.innerHTML = `<i class="${getFaIcon(item.iconName)}"></i> <span>${item.title}</span>`;
                    menuItem.addEventListener('click', () => {
                        loadPage(item.id);
                        closeDrawer();
                    });
                    dom.drawerMenuNav.appendChild(menuItem);
                });
            }
        }

        // Load a specific page into the simulator view
        function loadPage(pageId) {
            activePageId = pageId;
            const sidebarItems = config.sidebarItems || [];
            
            // Highlight active item
            const items = dom.drawerMenuNav.querySelectorAll('.menu-item');
            items.forEach((it, idx) => {
                if (idx === 0) {
                    if (pageId === null) {
                        it.classList.add('active');
                    } else {
                        it.classList.remove('active');
                    }
                } else {
                    const item = sidebarItems[idx - 1];
                    if (pageId !== null && item && item.id === pageId) {
                        it.classList.add('active');
                    } else {
                        it.classList.remove('active');
                    }
                }
            });

            dom.contentArea.innerHTML = '';

            if (pageId === null) {
                // Load Main URL
                dom.appTitle.textContent = config.appName;
                dom.addressBar.style.display = 'flex';
                
                let url = config.primaryUrl ? config.primaryUrl.trim() : "";
                if (url && !/^https?:\/\//i.test(url)) {
                    url = "https://" + url;
                }
                dom.addressText.textContent = url || "https://example.com";
                
                if (url) {
                    dom.contentArea.innerHTML = `<iframe class="iframe-view" src="/api/proxy?url=${encodeURIComponent(url)}"></iframe>`;
                    // Show warning disclaimer since we are loading iframe on main url
                    dom.disclaimerBanner.style.display = 'block';
                } else {
                    dom.contentArea.innerHTML = `
                        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#888; padding:20px; text-align:center;">
                            <i class="fa-solid fa-globe" style="font-size:48px; margin-bottom:12px; color:var(--primary-color);"></i>
                            <p>لم يتم تكوين الرابط الأساسي للموقع بشكل صحيح.</p>
                        </div>
                    `;
                    dom.disclaimerBanner.style.display = 'none';
                }
            } else {
                const item = sidebarItems.find(i => i.id === pageId);
                if (item) {
                    dom.appTitle.textContent = item.title;
                    
                    if (item.type === 'WEB_URL') {
                        dom.addressBar.style.display = 'flex';
                        let url = item.urlOrContent ? item.urlOrContent.trim() : "";
                        if (url && !/^https?:\/\//i.test(url)) {
                            url = "https://" + url;
                        }
                        dom.addressText.textContent = url || "https://example.com";
                        dom.contentArea.innerHTML = `<iframe class="iframe-view" src="/api/proxy?url=${encodeURIComponent(url)}"></iframe>`;
                        dom.disclaimerBanner.style.display = 'block';
                    } else {
                        // Custom HTML Page
                        dom.addressBar.style.display = 'none';
                        dom.disclaimerBanner.style.display = 'none';
                        
                        const htmlContainer = document.createElement('div');
                        htmlContainer.className = 'html-view';
                        htmlContainer.innerHTML = item.urlOrContent;
                        dom.contentArea.appendChild(htmlContainer);
                    }
                }
            }
        }

        // Drawer controllers
        function openDrawer() {
            dom.appDrawer.classList.add('active');
            dom.drawerOverlay.classList.add('active');
        }

        function closeDrawer() {
            dom.appDrawer.classList.remove('active');
            dom.drawerOverlay.classList.remove('active');
        }

        // Helpers
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function getFaIcon(iconName) {
            switch (iconName) {
                case 'Home': return 'fa-solid fa-house';
                case 'Info': return 'fa-solid fa-circle-info';
                case 'Link': return 'fa-solid fa-link';
                case 'Settings': return 'fa-solid fa-gears';
                case 'Document': return 'fa-solid fa-file-invoice';
                case 'Star': return 'fa-solid fa-star';
                case 'Person': return 'fa-solid fa-user';
                default: return 'fa-solid fa-globe';
            }
        }

        // Auto trigger fetch
        fetchConfig();
    </script>
</body>
</html>
